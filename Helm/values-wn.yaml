# =============================================================================
# values-wn.yaml — Deploy on wn1 (backend) + wn2 (frontend)
#
# Nodes:  wn1 = NVIDIA L40S ×2 (46 GB, Ada Lovelace, compute 8.9)
#         wn2 = NVIDIA L40S ×2 (46 GB, Ada Lovelace, compute 8.9)
#
# Usage:
#   helm install monai ./helm/monai-inference \
#     -n monai --create-namespace \
#     -f helm/monai-inference/values-wn.yaml
# =============================================================================

nodeTarget: "wn"

backend:
  gpu:
    count: "1"
    productAffinity: true   # prefers nvidia.com/gpu.product=NVIDIA-L40S
  resources:
    limits:
      cpu: "8"
      memory: "16Gi"
      nvidia.com/gpu: "1"
    requests:
      cpu: "4"
      memory: "8Gi"
      nvidia.com/gpu: "1"
