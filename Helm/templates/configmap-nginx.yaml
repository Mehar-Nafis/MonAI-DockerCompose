# nginx.conf is mounted into the frontend pod at /etc/nginx/conf.d/default.conf.
# The backend service DNS name is injected via Helm templating so it stays
# correct regardless of the release name.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monai-inference.fullname" . }}-nginx-conf
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: frontend
    {{ include "monai-inference.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Reverse-proxy API calls to the backend Service
        location /api/ {
            proxy_pass http://{{ include "monai-inference.backendServiceName" . }}.{{ .Values.namespace }}.svc.cluster.local:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Inference can take several seconds — give it headroom
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Allow large uploads for /infer_upload
            client_max_body_size 50M;
        }

        # Proxy image requests to backend static file server
        location /images/ {
            proxy_pass http://{{ include "monai-inference.backendServiceName" . }}.{{ .Values.namespace }}.svc.cluster.local:8000/images/;
            proxy_set_header Host $host;
        }

        # Proxy heatmap static files to backend
        location /static/ {
            proxy_pass http://{{ include "monai-inference.backendServiceName" . }}.{{ .Values.namespace }}.svc.cluster.local:8000/static/;
            proxy_set_header Host $host;
        }
    }
