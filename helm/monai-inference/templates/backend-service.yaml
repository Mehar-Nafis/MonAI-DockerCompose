apiVersion: v1
kind: Service
metadata:
  name: {{ include "monai-inference.backendServiceName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: backend
    {{ include "monai-inference.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "monai-inference.name" . }}-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
