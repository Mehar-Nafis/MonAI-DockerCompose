apiVersion: v1
kind: Service
metadata:
  name: {{ include "monai-inference.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: frontend
    {{ include "monai-inference.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "monai-inference.name" . }}-frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.frontend.containerPort }}
      protocol: TCP
