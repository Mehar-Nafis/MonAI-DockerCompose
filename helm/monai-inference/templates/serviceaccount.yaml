---
# ServiceAccount for the backend (CUDA inference container)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "monai-inference.backendServiceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: backend
    {{ include "monai-inference.labels" . | nindent 4 }}
---
# ServiceAccount for the frontend (nginx container)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "monai-inference.frontendServiceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: frontend
    {{ include "monai-inference.labels" . | nindent 4 }}
