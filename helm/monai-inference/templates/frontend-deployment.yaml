apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "monai-inference.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: frontend
    {{ include "monai-inference.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "monai-inference.name" . }}-frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "monai-inference.name" . }}-frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: frontend
      # Trigger rolling update when nginx config changes
      annotations:
        checksum/nginx-conf: {{ include (print $.Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "monai-inference.frontendServiceAccountName" . }}

      # -----------------------------------------------------------------------
      # Node placement — frontend follows backend target node
      # wn  → wn2 (worker2)   |   c845 → c845 (worker3)
      # -----------------------------------------------------------------------
      nodeSelector:
        {{ include "monai-inference.frontendNodeSelector" . | nindent 8 }}

      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # nginx:alpine runs as root to bind port 80.
      # anyuid SCC binding (scc-rolebinding.yaml) permits this on OpenShift.
      securityContext:
        runAsUser: 0

      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.frontend.containerPort }}
              protocol: TCP

          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}

          # Mount the Helm-templated nginx.conf (contains the correct backend
          # Service DNS name for proxy_pass).
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true

          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.containerPort }}
            periodSeconds: 30

      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "monai-inference.fullname" . }}-nginx-conf
